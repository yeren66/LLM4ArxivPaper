# =============================
# LLM4ArxivPaper Main Configuration Template
#
# Notes:
# 1. All fields can be adjusted as needed; delete unused array configurations if not required.
# 2. If a field supports reading from environment variables, ${VAR_NAME} format is used in examples.
# 3. This template aims to help quickly understand meanings; please streamline as needed before actual run.
# =============================

openai:
  # ✅ OpenAI API Key, supports injection via OPENAI_API_KEY environment variable
  api_key: "${API_KEY}"

  # ✅ If using Azure/OpenAI compatible service, specify `base_url`; leave empty for default official address
  base_url: "${BASE_URL}"

  # ✅ Model for relevance scoring (lightweight, runs once per candidate)
  relevance_model: "deepseek-v4-flash"

  # ✅ Model for core summary, interest-question generation and Q&A with quotes
  summarization_model: "deepseek-v4-flash"

  # ✅ Global temperature, controls generation randomness (0~1, lower = more stable)
  temperature: 0.2

  # ✅ Output language: 'zh-CN' (Simplified Chinese) or 'en' (English)
  language: "zh-CN"

fetch:
  # ✅ Max papers to fetch per Topic, used to control costs
  max_papers_per_topic: 50

  # ✅ Query lookback days: e.g., 7 means fetch papers published within last 7 days
  days_back: 7

  # ✅ arXiv API request interval (seconds), avoid rate limiting
  request_delay: 3.0

topics:
  # ✅ Each Topic represents a focus area, can be added/removed anytime
  - name: "LLM for Code Generation"            # Unique identifier (for filenames/directories)
    label: "LLM for Code Generation"                   # User-visible label (can be Chinese for prompts)

    query:
      # ✅ arXiv category filter, fill in official subject code
      categories: ["cs.SE", "cs.AI", "cs.PL", "cs.LG"]

      # ✅ Keywords expected in title/abstract, supports phrases
      include: ["code generation", "code completion", "program synthesis", "repository-level"]

      # ✅ Keywords to exclude, prevent noise
      exclude: ["protein", "molecular", "chemistry", "speech"]

    # ✅ User's interest description for this field, passed to LLM for reference
    interest_prompt: |
      I am interested in how large language models generate, complete, and synthesize source code.
      My focus is on repository-level generation, long-context handling, and post-training techniques
      (SFT, RLHF/RLAIF, preference learning, RL with execution feedback) that improve correctness
      on real-world software engineering tasks. I also care about new benchmarks and evaluation
      methodologies that go beyond pass@k on isolated functions — for example, those that measure
      compilation, execution, integration with existing codebases, or human-in-the-loop usage.

  - name: "Automated Program Repair"
    label: "Automated Program Repair"
    query:
      categories: ["cs.SE", "cs.AI"]
      include: ["program repair", "bug fixing", "patch generation", "fault localization", "SWE-bench"]
      exclude: ["hardware", "circuit", "network repair", "self-healing material"]
    interest_prompt: |
      I follow automated program repair (APR), covering both classical search-based / template-based
      approaches and modern LLM-driven agents. I am especially interested in how systems handle
      fault localization, patch generation, and patch validation, and how they avoid plausible but
      incorrect (overfitting) patches. Empirical studies, benchmark releases (Defects4J, SWE-bench,
      Bugs.jar, etc.), and reports on industrial deployment are highly relevant. Cross-cutting work
      that connects APR with testing, static analysis, or formal verification is also of interest.

relevance:
  # ✅ Dimension definitions for paper relevance, can add/remove/adjust weights based on interests
  scoring_dimensions:
    - name: "topic_alignment"       # Topic fit
      weight: 0.35
      description: "Whether paper research direction aligns with my focus areas"
    - name: "methodology_fit"       # Methodology match
      weight: 0.25
      description: "Whether proposed methods are directly relevant to my concerns"
    - name: "novelty"               # Innovation
      weight: 0.2
      description: "Whether paper provides novel contributions or perspectives"
    - name: "experiment_coverage"   # Experiment completeness
      weight: 0.2
      description: "Whether experiment/evaluation setup sufficiently answers key questions"

  # ✅ Pass threshold: total score >= this value considered "relevant", ultimately retained
  pass_threshold: 60

summarization:
  # ✅ Target number of TODO list items, actual generated count may vary slightly
  task_list_size: 5

  # ✅ Max key sections displayed in each summary, prevent overly long output
  max_sections: 4

site:
  # Kept for backwards compatibility; no longer used (there is no static site).
  output_dir: "site"

  # ✅ Your Vercel app URL. Used to build "view full report" links inside the
  #    weekly email digest. Leave blank if you only use Tier 1.
  base_url: "https://your-instance.vercel.app"

email:
  # ✅ Whether to enable email push (false = disabled)
  enabled: true

  # ✅ Sender email (must support SMTP), recommend using app-specific password
  sender: "${MAIL_USERNAME}"

  # ✅ Recipient list — change this to your own address
  recipients: ["you@example.com"]

  # ✅ SMTP server settings (recommend injecting sensitive info via environment variables)
  smtp_host: "smtp.gmail.com"
  smtp_port: 465
  username: "${MAIL_USERNAME}"
  password: "${MAIL_PASSWORD}"  # Recommend exporting environment variable before running
  use_tls: false
  use_ssl: true
  timeout: 30

  # ✅ Email subject template. Leave empty to follow openai.language (so the
  #    subject matches the body). To override, write your own, optionally
  #    using {run_date} and {paper_count} placeholders.
  subject_template: ""

archive:
  # ✅ The daily archive-to-git cron snapshots live KV state into this repo.
  #    Each switch can also be overridden by an env var of the same name in
  #    UPPER_SNAKE_CASE (ARCHIVE_STARS / ARCHIVE_CHATS).
  #
  #    stars — low-sensitivity ("papers I found interesting"); a git backup
  #            is generally useful, so default ON.
  #    chats — your LLM conversations may reveal what you're researching.
  #            Default OFF so a mis-configured PUBLIC repo never leaks them.
  #            If your instance repo is PRIVATE (the recommended setup),
  #            flip this to true to get a durable git backup of chat history.
  stars: true
  chats: false

runtime:
  # ✅ Run mode:
  #    - online  : Call OpenAI API for real scoring & summarization (requires API Key)
  #    - offline : Use heuristic rules, suitable for local debugging or no-network scenarios
  mode: "online"

  # ✅ Limit paper count processed per topic; null means use fetch.max_papers_per_topic
  paper_limit: null
